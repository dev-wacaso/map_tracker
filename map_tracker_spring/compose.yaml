services:
  postgis:
    image: 'postgis/postgis:18-3.6'
#    image: 'postgis/postgis:17-3.5-alpine'
#    image: 'postgis/postgis:17-3.5'
#    image: 'postgres:18.0-alpine3.22'
    container_name: postgis
    restart: unless-stopped
    environment:
      - 'POSTGRES_PASSWORD=postgis'
    ports:
      - '5432:5432'
    volumes:
      - postgis_data:/var/lib/postgresql
    networks:
      - isquibly-net
      - maptracker-net

  redis:
    image: 'redis:7.4'
    container_name: redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - isquibly-net
      - maptracker-net

volumes:
  postgis_data:
    external: true
  redis_data:
    external: true

networks:
  isquibly-net:
    external: true
  maptracker-net:
    external: true
