spring:
  application:
    name: map-tracker
  datasource:
    url: jdbc:postgresql://localhost:5432/map_tracker
    username: tracker
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: localhost
      port: 6379

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
  jackson:
    property-naming-strategy: SNAKE_CASE

logging:
  level:
    org.flywaydb: DEBUG
    org.springframework.jdbc.datasource: DEBUG
    org.postgresql: DEBUG
    org.hibernate.SQL: DEBUG
    com.zaxxer.hikari: INFO
    org.hibernate.type.descriptor.sql.BasicBinder: DEBUG
    com.isquibly.maptracker: DEBUG
#    org.springframework: DEBUG

server:
  port: 8000

app:
  config:
    # How often transmitters (riders) are expected to post their location, in seconds.
    # Used by the client to know how frequently to send updates.
    transmitter-interval-seconds: 15

    # Zoom level below which the map shows nothing (no requests sent).
    zoom-threshold-heatmap: 5.0

    # Zoom level above which the map switches from heatmap to individual rider detail markers.
    zoom-threshold-detail: 7.0

    # H3 hex resolution used for the coarse heatmap layer.
    # Lower = larger cells. Resolution 5 ≈ 250 km² per cell.
    h3-resolution-heatmap: 5

    # H3 hex resolution used for the fine detail layer.
    # Higher = smaller cells. Resolution 8 ≈ 0.7 km² per cell.
    h3-resolution-detail: 8

    # How often the viewer client should poll for fresh bucket data, in seconds.
    # Sent to the client via /config so it can set its own refresh timer.
    viewer-refresh-interval-default-seconds: 15

    # How long a rider's last-known position is considered active, in seconds.
    # Riders absent longer than this are excluded from bucket reads and pruned by the pruner.
    rider-ttl-seconds: 60

    # How often the server-side pruner sweeps all region buckets to remove expired riders, in seconds.
    # Should be shorter than rider-ttl-seconds. Stale entries may linger up to this long past expiry.
    pruner-interval-seconds: 60
