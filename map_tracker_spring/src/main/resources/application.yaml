spring:
  application:
    name: map-tracker
  datasource:
    url: jdbc:postgresql://localhost:5432/map_tracker
    username: mapuser
    password: tracker
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: localhost
      port: 6379

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
  jackson:
    property-naming-strategy: SNAKE_CASE

logging:
  level:
    org.flywaydb: DEBUG
    org.springframework.jdbc.datasource: DEBUG
    org.postgresql: DEBUG
    org.hibernate.SQL: DEBUG
    com.zaxxer.hikari: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

server:
  port: 8000

app:
  config:
    transmitter-interval-seconds: 300
    zoom-threshold-heatmap: 7.0
    zoom-threshold-detail: 11.0
    h3-resolution-heatmap: 5
    h3-resolution-detail: 8
    viewer-refresh-interval-default-seconds: 300
